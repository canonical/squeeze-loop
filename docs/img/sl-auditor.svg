@startuml sl-auditor
title sl-auditor (meta)
left to right direction
skinparam rectangleBorderColor #555
skinparam shadowing false
skinparam ArrowFontColor #888888
skinparam TitleFontColor #888888

rectangle "SL auditor (runs Dimensions 1-9)" as A_auditor #E8541E
rectangle "Bridge -> the audited loop (run / inspected as a sub-agent)" as A_target_loop #E8541E
rectangle "Disjoint base (cross-provider / human reviewer, terminus)" as A_disjoint_base #E8541E

rectangle "Compliance contract (C1-C4 + stabilizer set)" as S_compliance_contract #C9E7CB
rectangle "sl_disjointness_check.py over the target's .sl.json (mechanical floor)" as S_disjointness_checker #F3CBD0
rectangle "Barrier ablation + seeded coherent-and-wrong probes + flag-rate band" as S_calibration_probes #F3CBD0
rectangle "The target loop's SL-1.0 self-description (the claim under audit)" as S_target_self_description #E2E2E2
rectangle "The target loop's implementation internals + its actors' rationale" as S_target_internals #F4CCCC
rectangle "Per-dimension findings report (D1-D9, with severities)" as S_audit_report #E2E2E2
rectangle "Disjoint base judgment (cross-provider / human review)" as S_disjoint_review #D9D2E9

A_auditor - -> S_compliance_contract : U
A_auditor - -> S_disjointness_checker : L
A_auditor - -> S_calibration_probes : L
A_auditor ..> S_audit_report : produces
A_target_loop ..> S_target_self_description : produces
A_target_loop ..> S_target_internals : produces
A_disjoint_base - -> S_compliance_contract : U
A_disjoint_base ..> S_disjoint_review : produces

A_auditor -[#red,dashed]-> S_target_internals : ✗ must not see

A_auditor -[#blue]-> A_target_loop : catches
A_disjoint_base -[#blue]-> A_auditor : catches

legend right
|= Colour |= Meaning |
|<#E8541E>| Agent (actor) |
|<#C9E7CB>| Upper-bound material |
|<#F3CBD0>| Executable oracle |
|<#E2E2E2>| Artifact |
|<#F4CCCC>| Rationale (must-not-see) |
|<#D9D2E9>| Human judgment |
endlegend
@enduml

