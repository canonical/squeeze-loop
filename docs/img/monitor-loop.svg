@startuml monitor-loop
title monitor-loop (monitor)
left to right direction
skinparam rectangleBorderColor #555
skinparam shadowing false
skinparam ArrowFontColor #888888
skinparam TitleFontColor #888888

rectangle "Monitor-loop coordinator" as A_coordinator #E8541E
rectangle "Skill monitor (Gate S)" as A_monitor #E8541E
rectangle "Bridge -> the observed base loop (run as a sub-agent)" as A_sub_base #E8541E
rectangle "External / human reviewer (terminus)" as A_human_reviewer #E8541E

rectangle "Base loop's upper bound (the spec the skill must not contradict)" as S_base_u #C9E7CB
rectangle "Base loop's executable oracle (differential comparator)" as S_base_l #F3CBD0
rectangle "The base loop's consolidated skill (the soft output under test)" as S_skill_under_test #E2E2E2
rectangle "The deciding actor's rationale for the skill" as S_producer_rationale #F4CCCC
rectangle "Gate S verdict (PASS / CARVE-OUT / REJECT)" as S_gate_s_verdict #E2E2E2
rectangle "External / human reviewer judgment" as S_human_review #D9D2E9

A_coordinator - -> S_base_u : U
A_coordinator - -> S_base_l : L
A_coordinator - -> S_gate_s_verdict : L
A_monitor - -> S_base_u : U
A_monitor - -> S_base_l : L
A_monitor ..> S_gate_s_verdict : produces
A_sub_base ..> S_skill_under_test : produces
A_sub_base ..> S_producer_rationale : produces
A_human_reviewer - -> S_base_u : U
A_human_reviewer ..> S_human_review : produces

A_coordinator -[#red,dashed]-> S_producer_rationale : ✗ must not see
A_monitor -[#red,dashed]-> S_producer_rationale : ✗ must not see

A_monitor -[#blue]-> A_sub_base : catches
A_coordinator -[#blue]-> A_monitor : catches
A_human_reviewer -[#blue]-> A_coordinator : catches

legend right
|= Colour |= Meaning |
|<#E8541E>| Agent (actor) |
|<#C9E7CB>| Upper-bound material |
|<#F3CBD0>| Executable oracle |
|<#E2E2E2>| Artifact |
|<#F4CCCC>| Rationale (must-not-see) |
|<#D9D2E9>| Human judgment |
endlegend
@enduml

