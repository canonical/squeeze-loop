@startuml instance-a
title instance-a (base)
left to right direction
skinparam rectangleBorderColor #555
skinparam shadowing false

rectangle "Gate sentinel / orchestrator" as A_sentinel #E8541E
rectangle "Analytical implementer" as A_implementer #E8541E
rectangle "Independent exerciser" as A_exerciser #E8541E

rectangle "Metric Handbook (binding clauses)" as S_metric_handbook #C9E7CB
rectangle "Frozen SQLite warehouse (storage plane)" as S_warehouse_db #F3CBD0
rectangle "Certified baseline + signature (invariant plane)" as S_history_ledger #F3CBD0
rectangle "Implementer's metric query/result" as S_impl_query #E2E2E2
rectangle "Exerciser's positive/negative validation matrix" as S_validation_matrix #E2E2E2

A_sentinel - -> S_metric_handbook : U
A_sentinel - -> S_warehouse_db : L
A_sentinel - -> S_history_ledger : L
A_sentinel - -> S_impl_query : L
A_sentinel - -> S_validation_matrix : L
A_implementer - -> S_metric_handbook : U
A_implementer - -> S_warehouse_db : L
A_implementer ..> S_impl_query : produces
A_exerciser - -> S_metric_handbook : U
A_exerciser - -> S_warehouse_db : L
A_exerciser - -> S_history_ledger : L
A_exerciser ..> S_validation_matrix : produces

A_implementer -[#red,dashed]-> S_validation_matrix : ✗ must not see
A_exerciser -[#red,dashed]-> S_impl_query : ✗ must not see

A_exerciser -[#blue]-> A_implementer : catches
A_sentinel -[#blue]-> A_exerciser : catches

legend right
|= Colour |= Meaning |
|<#E8541E>| Agent (actor) |
|<#C9E7CB>| Upper-bound material |
|<#F3CBD0>| Executable oracle |
|<#E2E2E2>| Artifact |
|<#F4CCCC>| Rationale (must-not-see) |
|<#D9D2E9>| Human judgment |
